<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WordGlow" />
  <title>WordGlow</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@500;700&family=Noto+Nastaliq+Urdu:wght@500;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Language picker (first run only — switch later via gear icon on home) -->
    <section id="lang-screen" class="screen hidden">
      <h1>WordGlow</h1>
      <p class="subtitle">Choose your main language</p>
      <div class="language-buttons">
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn rtl" data-lang="ur" dir="rtl">اردو</button>
        <button class="lang-btn rtl" data-lang="ar" dir="rtl">العربية</button>
      </div>
    </section>

    <!-- Home: level picker -->
    <section id="home-screen" class="screen hidden">
      <header class="home-header">
        <button id="lang-switch" class="chip" aria-label="Change language">🌐 <span id="lang-label">EN</span></button>
        <div class="stars-pill">⭐ <span id="lifetime-stars">0</span></div>
      </header>
      <h2 class="home-title">Pick a Level</h2>
      <div id="level-grid" class="level-grid"></div>
    </section>

    <!-- Generic game shell — each level renders into #stage -->
    <section id="game-screen" class="screen hidden">
      <header class="game-header">
        <button id="back-home" class="icon-btn" aria-label="Back">←</button>
        <div class="game-title-wrap">
          <div id="game-title" class="game-title">Level</div>
          <div id="game-subtitle" class="game-subtitle"></div>
        </div>
        <button id="game-info" class="info-btn" aria-label="How to play">i</button>
        <div class="score-pill">
          <span id="round-score">0</span>
          <span class="score-label">pts</span>
        </div>
      </header>
      <div id="stage" class="stage"></div>
    </section>

    <!-- Sub-level picker (Level 1: ABC Crush packs) -->
    <section id="subs-screen" class="screen hidden">
      <header class="game-header">
        <button id="subs-back" class="icon-btn" aria-label="Back">←</button>
        <div class="game-title-wrap">
          <div class="game-title">Level 1: ABC Crush</div>
          <div class="game-subtitle">Pick a letter pack</div>
        </div>
        <button id="subs-info" class="info-btn" aria-label="How to play">i</button>
      </header>
      <div id="subs-grid" class="level-grid"></div>
    </section>

    <!-- Round/level complete -->
    <section id="done-screen" class="screen hidden">
      <h2 id="done-title">Nice!</h2>
      <div class="big-stars" id="done-stars">⭐⭐⭐</div>
      <p id="done-summary" class="muted"></p>
      <div class="done-actions">
        <button id="done-again" class="button secondary">Play Again</button>
        <button id="done-next" class="button">Next Level</button>
        <button id="done-home" class="button ghost">Home</button>
      </div>
    </section>

    <footer class="app-footer">
      <a href="https://fb.com/Khalidgraphy" target="_blank" rel="noopener">by Khalidgraphy</a>
      <span class="dot">·</span>
      <a href="https://fb.com/helloMeeran" target="_blank" rel="noopener">on demand of Meeran Mir</a>
    </footer>

  </div>

  <!-- Info popup (hidden by default) -->
  <div id="info-overlay" class="info-overlay hidden" aria-hidden="true">
    <div class="info-card" role="dialog" aria-modal="true">
      <div class="info-title" id="info-title">How to play</div>
      <div class="info-text" id="info-text"></div>
      <button class="button" id="info-close">Got it</button>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
