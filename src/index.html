<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WordGlow" />
  <title>WordGlow</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">

    <section id="language-select" class="screen">
      <h1>WordGlow</h1>
      <p class="subtitle">Tap a language to learn</p>
      <div class="language-buttons">
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn rtl" data-lang="ar" dir="rtl">العربية</button>
        <button class="lang-btn rtl" data-lang="ur" dir="rtl">اردو</button>
      </div>
    </section>

    <section id="game-screen" class="screen hidden">
      <header class="header">
        <button id="back-btn" class="icon-btn" aria-label="Back">←</button>
        <div class="level">Level <span id="current-level">1</span></div>
        <div class="stars">⭐ <span id="stars">0</span></div>
      </header>

      <div id="word-display" class="word-display">
        <div id="target-image" class="target-image">❓</div>
        <button id="play-audio" class="play-button" aria-label="Play sound">🔊</button>
        <div id="target-word" class="target-word"></div>
      </div>

      <div id="game-board" class="game-board"></div>

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </section>

    <section id="complete-screen" class="screen hidden">
      <h2>Level Complete!</h2>
      <div id="stars-earned" class="stars-display">⭐⭐⭐</div>
      <button id="next-btn" class="button">Next Level</button>
    </section>

  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
